<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Vancouver Parks Tracker</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Vancouver Parks Tracker</h1>
      <p>Track parks you have visited, save favourites, and write quick notes.</p>
    </header>

    <main class="layout">
      <section class="map-panel" aria-label="Map panel">
        <div id="map" aria-label="Map of Vancouver parks"></div>
      </section>

      <aside class="details-panel" aria-live="polite">
        <div class="panel-head">
          <h2 id="park-name">Select a park</h2>
          <p id="status-text">Click a park boundary to add your tracker details.</p>
        </div>

        <div id="form-controls" class="controls controls-disabled">
          <label class="toggle-row">
            <input id="visited-toggle" type="checkbox" />
            <span>Visited</span>
          </label>

          <label class="toggle-row">
            <input id="favorite-toggle" type="checkbox" />
            <span>Favourite</span>
          </label>

          <label class="notes-label" for="note-input">Notes</label>
          <textarea
            id="note-input"
            rows="6"
            maxlength="220"
            placeholder="What did you like about this park?"
          ></textarea>
          <div class="note-meta">
            <span id="note-count">0 / 220</span>
            <span id="save-indicator" class="save-indicator">Saved</span>
          </div>
        </div>

        <p id="app-message" class="message" role="status"></p>
      </aside>
    </main>

    <footer class="page-actions" aria-label="Page actions">
      <button id="clear-storage-btn" class="danger-button" type="button">
        Clear saved park data
      </button>
    </footer>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
